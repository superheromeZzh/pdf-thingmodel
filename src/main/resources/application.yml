spring:
  application:
    name: pdf-thingmodel
  servlet:
    multipart:
      # 上传 PDF 的体积上限。生产环境按需调整。
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    # 走 openGauss 官方驱动；如果你的 GaussDB 实例是 PostgreSQL 兼容版，可以把
    # url 换成 jdbc:postgresql://... 并把驱动改成 org.postgresql.Driver
    driver-class-name: org.opengauss.Driver
    url: jdbc:opengauss://127.0.0.1:5432/pdftm?currentSchema=public
    username: pdftm
    password: ${DB_PASSWORD:please-change-me}
    hikari:
      maximum-pool-size: 16
      minimum-idle: 2
      connection-timeout: 5000
      pool-name: pdftm-pool

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  # 扫描 com.example.pdftm.common.handler 下的 TypeHandler（包含 JsonbTypeHandler）
  type-handlers-package: com.example.pdftm.common.handler
  # 预留 XML mapper 位置；目前所有 mapper 都用注解写，不强制存在
  mapper-locations: classpath*:mapper/**/*.xml

llm:
  dashscope:
    # OpenAI 兼容模式入口；切其它 OpenAI 兼容服务时改这一行即可
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${DASHSCOPE_API_KEY:}
    # 阶段 1（骨架抽取）走便宜模型
    cheap-model: qwen-turbo
    # 阶段 3 + LlmEditService 走强模型
    strong-model: qwen-max
    timeout-seconds: 120

logging:
  level:
    com.example.pdftm: DEBUG
    org.mybatis: INFO
